<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vashisth Goswami — Resume</title>
  <meta name="description" content="Vashisth Goswami — Cloud Support Engineer II (DevOps) at AWS. AWS, Kubernetes, ECS/EKS, CI/CD, Terraform." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Sticky nav -->
    <nav id="nav">
      <a href="#top" class="brand">VG</a>
      <div class="nav-links">
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#experience">Experience</a>
        <a href="#projects">Projects</a>
        <a href="#education">Education</a>
      </div>
      <button id="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme">☀️</button>
    </nav>

    <!-- Hero -->
    <header id="top" class="hero">
      <div class="hero-inner">
        <p class="eyebrow" id="hero-eyebrow"></p>
        <h1 id="hero-name"></h1>
        <h2 id="hero-title"></h2>
        <p class="tagline" id="hero-tagline"></p>
        <div class="hero-actions">
          <a class="btn primary" id="hero-email" href="#">Email me</a>
          <a class="btn" href="#projects">View projects</a>
        </div>
        <div class="contact-row" id="contact-row"></div>
      </div>
    </header>

    <main>
      <section id="about" class="section">
        <h3 class="section-title">About</h3>
        <p class="lead" id="about-text"></p>
      </section>

      <section id="skills" class="section">
        <h3 class="section-title">Technical Skills</h3>
        <div class="skills-grid" id="skills-grid"></div>
      </section>

      <section id="experience" class="section">
        <h3 class="section-title">Experience</h3>
        <div class="timeline" id="timeline"></div>
      </section>

      <section id="projects" class="section">
        <h3 class="section-title">Cloud Projects</h3>
        <p class="lead">
          A hands-on container portfolio demonstrating ECS, EKS, and CI/CD on AWS.
          <a href="https://github.com/Vashisth-G-sudo/portfolio-projects" target="_blank" rel="noopener">View all on GitHub →</a>
        </p>
        <div class="project-grid" id="project-grid"></div>

        <h3 class="section-title sub">Academic Projects</h3>
        <div class="project-grid" id="academic-grid"></div>
      </section>

      <section id="education" class="section">
        <h3 class="section-title">Education</h3>
        <div class="edu-card">
          <h4 id="edu-school"></h4>
          <p class="degree" id="edu-degree"></p>
          <p class="spec" id="edu-spec"></p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p id="footer-line"></p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
